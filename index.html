<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Y dónde está la merma? - Chef Mauricio Marín</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --naranja-bbq: #e67e22;
            --oscuro-carbon: #212529;
            --gris-claro: #f8f9fa;
        }
        body { background-color: var(--gris-claro); color: #333; font-family: 'Segoe UI', sans-serif; }
        
        .header-chef { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('costilla.jpg');
            background-size: cover;
            background-position: center;
            color: white; 
            padding: 60px 20px; 
            border-radius: 0 0 30px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card { 
            border: none; 
            border-radius: 15px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); 
            margin-bottom: 25px;
            overflow: hidden;
        }

        .card-header { font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .form-label { font-weight: 600; color: var(--oscuro-carbon); }
        .form-control { 
            border: 2px solid #dee2e6; 
            padding: 12px; 
            font-size: 1.1rem;
        }
        .form-control:focus { 
            border-color: var(--naranja-bbq); 
            box-shadow: 0 0 0 0.25rem rgba(230, 126, 34, 0.25); 
        }

        .btn-primary { 
            background-color: var(--naranja-bbq); 
            border: none; 
            padding: 15px; 
            font-size: 1.2rem; 
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-primary:hover { background-color: #d35400; transform: translateY(-2px); }

        #resultadoBusqueda { 
            background-color: var(--oscuro-carbon); 
            color: white; 
            border-radius: 15px; 
            padding: 25px;
        }
        
        footer { margin-top: 50px; padding: 30px; color: #7f8c8d; border-top: 1px solid #dee2e6; }
    </style>
</head>
<body>

    <div class="header-chef text-center mb-5">
        <h1 class="display-4 fw-bold">¿Y dónde está la merma?</h1>
        <p class="lead text-uppercase">Análisis de Rendimiento - Chef Mauricio Marín</p>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                
                <div class="card">
                    <div class="card-header bg-dark text-white">1. Recepción y Pesaje Inicial</div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label">Producto (Ej: Brisket, Costilla)</label>
                                <input type="text" id="producto" class="form-control" placeholder="Nombre del corte">
                            </div>
                            <div class="col-md-12">
                                <label class="form-label">Peso Bruto Inicial (Kg)</label>
                                <input type="number" id="pesoBruto" class="form-control" value="10" step="0.01">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-warning">
                    <div class="card-header bg-warning text-dark">2. Proceso de Limpieza (Trimado)</div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Gordo Retirado (Kg)</label>
                                <input type="number" id="pesoGordo" class="form-control" placeholder="0.00" step="0.01">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Cebo / Tejido (Kg)</label>
                                <input type="number" id="pesoCebo" class="form-control" placeholder="0.00" step="0.01">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2 mb-5">
                    <button class="btn btn-primary btn-lg shadow" onclick="calcularMermaInicial()">GENERAR INFORME DE LIMPIEZA</button>
                </div>

                <div id="resultadoBusqueda" class="d-none animate__animated animate__fadeIn">
                    <h3 class="text-warning border-bottom pb-2">Informe de Resultados:</h3>
                    <div class="row mt-4">
                        <div class="col-6">
                            <p class="mb-1 text-uppercase small">Peso Neto para Ahumar</p>
                            <h2 class="text-success" id="resPesoNeto">0.00 Kg</h2>
                        </div>
                        <div class="col-6 text-end">
                            <p class="mb-1 text-uppercase small">Pérdida en Limpieza</p>
                            <h2 class="text-danger" id="resPorcentaje">0%</h2>
                        </div>
                    </div>
                    <hr>
                    <p id="detalleEscrito" class="lead font-italic"></p>
                </div>

            </div>
        </div>
    </div>

    <footer class="text-center">
        <p>App desarrollada por <strong>Vibras Positivas</strong> - Derecho de autor (3117700431)</p>
    </footer>

    <script>
        function calcularMermaInicial() {
            const bruto = parseFloat(document.getElementById('pesoBruto').value) || 0;
            const gordo = parseFloat(document.getElementById('pesoGordo').value) || 0;
            const cebo = parseFloat(document.getElementById('pesoCebo').value) || 0;
            const producto = document.getElementById('producto').value || "el producto";

            const totalMermas = gordo + cebo;
            const pesoNeto = bruto - totalMermas;
            const porcentaje = (totalMermas / bruto) * 100;

            const divResultado = document.getElementById('resultadoBusqueda');
            divResultado.classList.remove('d-none');

            document.getElementById('resPesoNeto').innerText = pesoNeto.toFixed(2) + " Kg";
            document.getElementById('resPorcentaje').innerText = porcentaje.toFixed(1) + "%";
            
            document.getElementById('detalleEscrito').innerHTML = 
                `De los <strong>${bruto}kg</strong> iniciales de ${producto}, se han retirado <strong>${totalMermas.toFixed(2)}kg</strong> entre gordo y cebo. El producto entra al proceso con un rendimiento inicial del ${(100 - porcentaje).toFixed(1)}%.`;
            
            // Scroll suave al resultado
            divResultado.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
